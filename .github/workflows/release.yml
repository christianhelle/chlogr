name: Release

on:
  workflow_dispatch:

env:
  VERSION: "0.1.${{ github.run_number }}"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.bump.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Update release versions
        run: |
          sed -i "s/^version: .*/version: ${{ env.VERSION }}/" snapcraft.yaml
          sed -i "s/^pub const VERSION = \".*\";$/pub const VERSION = \"${{ env.VERSION }}\";/" src/cli.zig

      - name: Commit, tag, and push
        id: bump
        run: |
          git config --global user.name "Continuous Integration"
          git config --global user.email "username@users.noreply.github.com"
          git add snapcraft.yaml src/cli.zig
          git commit -m "Bump release version to v${{ env.VERSION }}"
          git push origin HEAD:main
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
            - target: x86_64-linux
              os: ubuntu-latest
              artifact: chlogr-linux-x86_64
            - target: aarch64-linux
              os: ubuntu-latest
              artifact: chlogr-linux-aarch64
            - target: x86_64-macos
              os: macos-latest
              artifact: chlogr-macos-x86_64
            - target: aarch64-macos
              os: macos-latest
              artifact: chlogr-macos-aarch64
            - target: x86_64-windows
              os: windows-latest
              artifact: chlogr-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin chlogr

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path zig-out\bin\chlogr.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
