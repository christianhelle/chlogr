name: changelog-generator
base: core22
version: 0.1.1
title: Argiope
summary: A fast, efficient, native CLI tool to automatically generate changelogs from GitHub tags, pull requests, and issue
license: MIT
source-code:
  - https://github.com/christianhelle/changelog-generator
website:
  - https://christianhelle.com/changelog-generator
  - https://github.com/christianhelle/changelog-generator
contact:
  - https://christianhelle.com
  - https://github.com/christianhelle
issues:
  - https://github.com/christianhelle/changelog-generator/issues
donation:
  - https://paypal.me/christianhelle
  - https://buymeacoffee.com/christianhelle
  - https://github.com/sponsors/christianhelle
description: |
  A fast, efficient, native CLI tool to automatically generate changelogs from GitHub tags, pull requests, and issues. Written in Zig

  Features
  - Fast, compiled binary (zero dependencies, pure Zig stdlib)
  - Generates Markdown changelogs automatically
  - Categorizes entries by labels (Features, Bug Fixes, Other)
  - Links to PRs, issues, and contributors
  - Smart token resolution (--token flag → env vars → gh auth token CLI)
  - Works with any GitHub repository
  - Fully functional core logic verified with integration tests

grade: stable
confinement: strict

apps:
  changelog-generator:
    command: bin/changelog-generator
    plugs:
      - home
      - network
      - removable-media

parts:
  zig:
    plugin: nil
    build-packages:
      - curl
      - xz-utils
    override-build: |
      snap install zig --classic --beta

  changelog-generator:
    after: [zig]
    plugin: nil
    source: .
    override-build: |
      export PATH="$SNAPCRAFT_STAGE/zig:$PATH"
      zig build -Doptimize=ReleaseFast
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp zig-out/bin/changelog-generator $SNAPCRAFT_PART_INSTALL/bin/
